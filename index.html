<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudyPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#060b16;--navy2:#0b1322;--navy3:#111c33;--navy4:#1a2840;--navy5:#243452;
  --purple:#7c3aed;--purple2:#9d5cf6;--purple3:#c084fc;
  --text:#e8eaf6;--text2:#94a3b8;--text3:#4a5980;
  --green:#10b981;--border:rgba(124,58,237,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{display:flex;height:100vh;background:var(--navy);font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden;}

/* Sidebar */
.sidebar{width:220px;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 12px;gap:6px;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;padding:8px;margin-bottom:16px;}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--purple3));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 18px rgba(124,58,237,0.4);}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;}
.logo-text span{color:var(--purple3);}

.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;cursor:pointer;border:1px solid transparent;transition:all 0.2s;font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;}
.nav-item:hover{background:var(--navy3);color:var(--text);}
.nav-item.active{background:rgba(124,58,237,0.18);border-color:rgba(124,58,237,0.35);color:var(--purple3);}
.nav-icon{font-size:18px;width:24px;text-align:center;}

.sidebar-bottom{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);}
.user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--navy3);}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple3));display:flex;align-items:center;justify-content:center;font-size:14px;}
.user-name{font-size:13px;font-weight:600;}
.user-year{font-size:11px;color:var(--text3);}

/* Main content area */
.content{flex:1;overflow:hidden;}
.content iframe{width:100%;height:100%;border:none;}

/* Loading screen */
.splash{position:absolute;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity 0.5s;}
.splash.hide{opacity:0;pointer-events:none;}
.splash-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--purple),var(--purple3));display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 40px rgba(124,58,237,0.5);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.splash-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;}
.splash-title span{color:var(--purple3);}
.splash-sub{font-size:14px;color:var(--text2);}
.splash-bar{width:200px;height:4px;background:var(--navy4);border-radius:10px;overflow:hidden;margin-top:8px;}
.splash-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple3));border-radius:10px;animation:load 1.8s ease forwards;}
@keyframes load{from{width:0%;}to{width:100%;}}
</style>
</head>
<body>

<!-- Splash screen -->
<div class="splash" id="splash">
  <div class="splash-icon">⚡</div>
  <div class="splash-title">Study<span>Pulse</span></div>
  <div class="splash-sub">Loading your workspace...</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Study<span>Pulse</span></div>
  </div>

  <a class="nav-item active" onclick="navigate('studypulse-dashboard.html', this)">
    <span class="nav-icon">🏠</span> Dashboard
  </a>
  <a class="nav-item" onclick="navigate('studypulse-timer.html', this)">
    <span class="nav-icon">⏱️</span> Pomodoro Timer
  </a>
  <a class="nav-item" onclick="navigate('studypulse-subjects.html', this)">
    <span class="nav-icon">📚</span> Subjects
  </a>
  <a class="nav-item" onclick="navigate('studypulse-goals.html', this)">
    <span class="nav-icon">🎯</span> Goals & Progress
  </a>
  <a class="nav-item" onclick="navigate('studypulse-flashcards.html', this)">
    <span class="nav-icon">🃏</span> Flashcards
  </a>
  <a class="nav-item" onclick="navigate('studypulse-auth.html', this)">
    <span class="nav-icon">🔐</span> Login / Register
  </a>

  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="user-avatar">👤</div>
      <div>
        <div class="user-name">CS Student</div>
        <div class="user-year">Year 4 · Computer Science</div>
      </div>
    </div>
  </div>
</div>

<!-- Content iframe -->
<div class="content">
  <iframe id="main-frame" src="studypulse-dashboard.html"></iframe>
</div>

<script>
  // Hide splash after 2 seconds
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide')
  }, 2000)

  function navigate(page, el) {
    // Update iframe
    document.getElementById('main-frame').src = page

    // Update active nav item
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'))
    el.classList.add('active')
  }
</script>
</body>
</html>
